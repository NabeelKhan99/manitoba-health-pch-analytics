version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: manitoba-health-db
    environment:
      POSTGRES_USER: NK-analyst
      POSTGRES_PASSWORD: pch2024
      POSTGRES_DB: manitoba-health
    ports:
      - "5438:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ddl:/docker-entrypoint-initdb.d
    networks:
      - analytics-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U NK-analyst -d manitoba-health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: manitoba-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: nk-analyst@manitoba.ca
      PGADMIN_DEFAULT_PASSWORD: 1234admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analytics-network

volumes:
  postgres-data:

networks:
  analytics-network:
    driver: bridge